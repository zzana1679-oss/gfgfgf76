<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Tree - Standard English Pro</title>
    
    <!-- PDF Generation Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --line-color: #333;
            --font-main: -apple-system, system-ui, sans-serif;
            --ios-blue: #007AFF;
        }

        body {
            background-color: #f2f2f7;
            font-family: var(--font-main);
            margin: 0; padding: 20px; color: #1c1c1e;
            text-align: center;
        }

        /* UI Elements */
        .header-ui { margin-bottom: 30px; }
        .header-ui h2 { font-size: 28px; font-weight: 800; margin: 0; color: #000; }
        .header-ui p { font-size: 14px; color: #8e8e93; margin-top: 5px; }

        .pdf-btn {
            position: fixed; bottom: 30px; right: 30px;
            padding: 15px 25px; background: var(--ios-blue);
            color: white; border: none; border-radius: 50px;
            font-weight: bold; font-size: 16px; cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15); z-index: 1000;
        }

        /* --- TREE ARCHITECTURE (Standard Downward) --- */
        #capture-area {
            background: white; padding: 60px 40px; border-radius: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            display: inline-block; min-width: 100%;
            overflow-x: auto; text-align: center;
        }

        .tree { display: inline-block; white-space: nowrap; }
        .tree ul {
            padding-top: 30px; position: relative;
            display: flex; justify-content: center;
            list-style: none; padding-left: 0; margin: 0;
        }

        .tree li {
            text-align: center; list-style-type: none;
            position: relative; padding: 30px 10px 0 10px;
            transition: all 0.3s;
        }

        /* The horizontal bracket line */
        .tree li::before, .tree li::after {
            content: ''; position: absolute; top: 0; right: 50%;
            border-top: 2px solid var(--line-color);
            width: 50%; height: 30px;
        }
        .tree li::after { right: auto; left: 50%; border-left: 2px solid var(--line-color); }

        /* Remove lines for single child */
        .tree li:only-child::after, .tree li:only-child::before { display: none; }
        .tree li:only-child { padding-top: 0; }

        /* Remove "wings" from far left and right children */
        .tree li:first-child::before, .tree li:last-child::after { border: 0 none; }
        .tree li:last-child::before { border-right: 2px solid var(--line-color); border-radius: 0 12px 0 0; }
        .tree li:first-child::after { border-radius: 12px 0 0 0; }

        /* The vertical line from parent down to the bracket */
        .tree ul ul::before {
            content: ''; position: absolute; top: 0; left: 50%;
            border-left: 2px solid var(--line-color);
            width: 0; height: 30px;
        }

        /* --- NODE BOX STYLING --- */
        .node-box {
            position: relative; display: inline-flex; flex-direction: column;
            align-items: center; border-radius: 16px; padding: 12px 20px;
            width: auto; min-width: 100px; max-width: 400px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            border: 2px solid rgba(255,255,255,0.3); z-index: 10; cursor: pointer;
        }

        .name-display {
            border: none; text-align: center; font-weight: 800; font-size: 17px;
            outline: none; background: transparent; color: white; min-width: 30px;
        }

        /* Heritage Colors */
        .color-1 { --base: #2ecc71; } .color-2 { --base: #3498db; } 
        .color-3 { --base: #9b59b6; } .color-4 { --base: #e67e22; } 
        .color-5 { --base: #e74c3c; }

        .accent-none { background: var(--base); }
        .accent-gold { background: linear-gradient(135deg, var(--base) 30%, #f1c40f 100%); }
        .accent-silver { background: linear-gradient(135deg, var(--base) 30%, #bdc3c7 100%); }
        .accent-bronze { background: linear-gradient(135deg, var(--base) 30%, #cd7f32 100%); }

        .node-root { background: #1a1a1a; border-color: #f1c40f; }

        /* Buttons Group */
        .btn-group { display: none; justify-content: center; gap: 10px; margin-top: 10px; width: 100%; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 8px; }
        .active-node .btn-group { display: flex; }
        .active-node { transform: scale(1.1); z-index: 100; box-shadow: 0 15px 30px rgba(0,0,0,0.2); }

        .circle-btn { border-radius: 50%; width: 28px; height: 28px; cursor: pointer; border: none; color: white; background: rgba(255,255,255,0.2); font-size: 18px; }
        
        [contenteditable]:empty:before { content: "Name"; opacity: 0.5; color: white; }
    </style>
</head>
<body onclick="closeAll()">

    <div class="header-ui">
        <h2>Family Tree Builder</h2>
        <p>Top-to-Bottom flow. Click boxes to Edit or add (+).</p>
    </div>

    <div id="capture-area">
        <div class="tree">
            <ul id="tree-root">
                <li>
                    <div class="node-box node-root" onclick="toggleNode(event, this)">
                        <div class="name-display" contenteditable="true">Root Name</div>
                        <div class="btn-group">
                            <button class="circle-btn" onclick="addChild(event, this)">+</button>
                        </div>
                    </div>
                    <ul></ul>
                </li>
            </ul>
        </div>
    </div>

    <button class="pdf-btn" id="download-btn" onclick="downloadPDF()">
        💾 Save as PDF
    </button>

    <script>
        const colors = ['1', '2', '3', '4', '5'];
        const accents = ['gold', 'silver', 'bronze', 'none'];
        let branchCount = 0;

        // Persistent data: Logic to save the tree state could be added here

        function toggleNode(e, el) {
            e.stopPropagation();
            const isActive = el.classList.contains('active-node');
            closeAll();
            if (!isActive) el.classList.add('active-node');
        }

        function closeAll() {
            document.querySelectorAll('.node-box').forEach(b => b.classList.remove('active-node'));
        }

        function addChild(e, btn) {
            e.stopPropagation();
            const parentLi = btn.closest('li');
            const parentBox = btn.closest('.node-box');
            let childUl = parentLi.querySelector('ul');
            
            if (!childUl) {
                childUl = document.createElement('ul');
                parentLi.appendChild(childUl);
            }

            let bCol = "", acc = "";
            if (parentBox.classList.contains('node-root')) {
                bCol = "color-" + colors[branchCount % 5];
                acc = "accent-none";
                branchCount++;
            } else {
                bCol = parentBox.className.split(' ').find(c => c.startsWith('color-')) || "color-1";
                acc = "accent-" + accents[childUl.children.length % 4];
            }

            const newLi = document.createElement('li');
            newLi.innerHTML = `
                <div class="node-box ${bCol} ${acc}" onclick="toggleNode(event, this)">
                    <div class="name-display" contenteditable="true"></div>
                    <div class="btn-group">
                        <button class="circle-btn" onclick="addChild(event, this)">+</button>
                        <button class="circle-btn" style="font-size:12px" onclick="if(confirm('Remove this person?')) this.closest('li').remove()">✕</button>
                    </div>
                </div>
                <ul></ul>`;
            
            childUl.appendChild(newLi);
            closeAll();
            setTimeout(() => { newLi.querySelector('.name-display').focus(); }, 50);
        }

        async function downloadPDF() {
            const btn = document.getElementById('download-btn');
            btn.innerText = "Please wait...";
            btn.disabled = true;
            closeAll();

            const captureArea = document.getElementById('capture-area');
            try {
                const canvas = await html2canvas(captureArea, { scale: 2, useCORS: true });
                const imgData = canvas.toDataURL('image/png');
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({
                    orientation: canvas.width > canvas.height ? 'l' : 'p',
                    unit: 'px',
                    format: [canvas.width, canvas.height]
                });
                pdf.addImage(imgData, 'PNG', 0, 0, canvas.width, canvas.height);
                pdf.save("family-tree-report.pdf");
            } catch (err) {
                alert("Capture failed.");
            }
            btn.innerText = "💾 Save as PDF";
            btn.disabled = false;
        }
    </script>
</body>
</html>
